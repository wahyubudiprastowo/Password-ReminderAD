<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Password Compliance Enforcer dashboard preview</title>
  <desc id="desc">A preview mockup of the PCE dashboard with sidebar navigation, KPI cards, scheduler status, charts, and recent actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".48" stop-color="#18233f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity=".45"/>
    </filter>
    <style>
      .glass{fill:rgba(255,255,255,.075);stroke:rgba(255,255,255,.16);stroke-width:1.2}
      .muted{fill:#94a3b8;font-family:Inter,Segoe UI,sans-serif;font-size:18px}
      .label{fill:#cbd5e1;font-family:Inter,Segoe UI,sans-serif;font-size:18px;font-weight:700}
      .small{fill:#94a3b8;font-family:Inter,Segoe UI,sans-serif;font-size:14px}
      .title{fill:#f8fafc;font-family:Inter,Segoe UI,sans-serif;font-size:28px;font-weight:800}
      .value{fill:#f8fafc;font-family:Inter,Segoe UI,sans-serif;font-size:42px;font-weight:800}
      .nav{fill:#cbd5e1;font-family:Inter,Segoe UI,sans-serif;font-size:18px;font-weight:650}
      .mono{fill:#e2e8f0;font-family:JetBrains Mono,Consolas,monospace;font-size:16px}
    </style>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="1180" cy="120" r="260" fill="#2563eb" opacity=".18"/>
  <circle cx="430" cy="760" r="340" fill="#6366f1" opacity=".13"/>
  <circle cx="1420" cy="760" r="300" fill="#06b6d4" opacity=".10"/>

  <rect x="32" y="32" width="270" height="836" rx="28" class="glass" filter="url(#shadow)"/>
  <rect x="80" y="70" width="174" height="126" rx="34" fill="rgba(99,102,241,.13)" stroke="rgba(255,255,255,.13)"/>
  <path d="M120 148c30-54 65-54 95 0" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <path d="M122 137h93" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round"/>
  <text x="167" y="235" text-anchor="middle" class="title">PCE</text>
  <text x="167" y="262" text-anchor="middle" class="small">PASSWORD COMPLIANCE</text>

  <rect x="58" y="310" width="218" height="54" rx="15" fill="url(#accent)"/>
  <text x="82" y="344" class="nav" fill="#fff">D</text>
  <text x="122" y="344" class="nav" fill="#fff">Dashboard</text>
  <text x="82" y="420" class="nav">U</text>
  <text x="122" y="420" class="nav">Users</text>
  <text x="82" y="480" class="nav">R</text>
  <text x="122" y="480" class="nav">Runs</text>
  <text x="82" y="540" class="nav">L</text>
  <text x="122" y="540" class="nav">Live Logs</text>
  <text x="82" y="600" class="nav">S</text>
  <text x="122" y="600" class="nav">Settings</text>
  <circle cx="72" cy="820" r="6" fill="#22c55e"/>
  <text x="92" y="826" class="small">Connected</text>

  <rect x="330" y="32" width="1078" height="72" rx="24" class="glass"/>
  <text x="362" y="78" class="title">Dashboard</text>
  <rect x="1220" y="52" width="154" height="34" rx="12" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)"/>
  <text x="1246" y="75" class="small">Refresh Data</text>

  <g transform="translate(330 132)">
    <rect width="164" height="126" rx="24" class="glass"/>
    <circle cx="44" cy="44" r="24" fill="rgba(34,197,94,.16)"/>
    <text x="36" y="52" class="label" fill="#22c55e">C</text>
    <text x="28" y="91" class="value">120</text>
    <text x="28" y="114" class="small">COMPLIANT</text>
  </g>
  <g transform="translate(514 132)">
    <rect width="164" height="126" rx="24" class="glass"/>
    <circle cx="44" cy="44" r="24" fill="rgba(245,158,11,.17)"/>
    <text x="36" y="52" class="label" fill="#f59e0b">W</text>
    <text x="28" y="91" class="value">18</text>
    <text x="28" y="114" class="small">EXPIRING 7D</text>
  </g>
  <g transform="translate(698 132)">
    <rect width="164" height="126" rx="24" class="glass"/>
    <circle cx="44" cy="44" r="24" fill="rgba(239,68,68,.17)"/>
    <text x="37" y="52" class="label" fill="#ef4444">E</text>
    <text x="28" y="91" class="value">7</text>
    <text x="28" y="114" class="small">EXPIRED</text>
  </g>
  <g transform="translate(882 132)">
    <rect width="164" height="126" rx="24" class="glass"/>
    <circle cx="44" cy="44" r="24" fill="rgba(239,68,68,.17)"/>
    <text x="38" y="52" class="label" fill="#ef4444">L</text>
    <text x="28" y="91" class="value">3</text>
    <text x="28" y="114" class="small">LOCKED</text>
  </g>
  <g transform="translate(1066 132)">
    <rect width="164" height="126" rx="24" class="glass"/>
    <circle cx="44" cy="44" r="24" fill="rgba(59,130,246,.17)"/>
    <text x="37" y="52" class="label" fill="#60a5fa">T</text>
    <text x="28" y="91" class="value">150</text>
    <text x="28" y="114" class="small">TOTAL</text>
  </g>
  <g transform="translate(1250 132)">
    <rect width="158" height="126" rx="24" class="glass"/>
    <circle cx="44" cy="44" r="24" fill="rgba(59,130,246,.17)"/>
    <text x="37" y="52" class="label" fill="#60a5fa">R</text>
    <text x="28" y="91" class="value" font-size="32">1h</text>
    <text x="28" y="114" class="small">LAST RUN</text>
  </g>

  <rect x="330" y="284" width="1078" height="128" rx="24" class="glass"/>
  <text x="362" y="330" class="label">Scheduler Status</text>
  <text x="362" y="367" class="small">Frequency</text>
  <text x="490" y="367" class="mono">hourly</text>
  <text x="650" y="367" class="small">Next Run</text>
  <text x="760" y="367" class="mono">2026-07-19 23:00</text>
  <text x="1000" y="367" class="small">Timezone</text>
  <text x="1114" y="367" class="mono">Asia/Jakarta</text>
  <rect x="362" y="384" width="962" height="1" fill="rgba(255,255,255,.12)"/>
  <text x="362" y="397" class="small">Reminder policy automation is ready. Enforcement remains controlled by configured run mode.</text>

  <rect x="330" y="438" width="702" height="252" rx="24" class="glass"/>
  <text x="362" y="484" class="label">30-Day Trend</text>
  <polyline points="380,635 456,604 532,612 608,570 684,585 760,535 836,552 912,506 990,518"
            fill="none" stroke="#22c55e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="380,604 456,570 532,590 608,544 684,526 760,500 836,484 912,468 990,452"
            fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
  <rect x="380" y="642" width="610" height="1" fill="rgba(255,255,255,.14)"/>

  <rect x="1058" y="438" width="350" height="252" rx="24" class="glass"/>
  <text x="1090" y="484" class="label">Expiry Distribution</text>
  <circle cx="1233" cy="575" r="74" fill="none" stroke="#22c55e" stroke-width="28" stroke-dasharray="285 465" transform="rotate(-90 1233 575)"/>
  <circle cx="1233" cy="575" r="74" fill="none" stroke="#f59e0b" stroke-width="28" stroke-dasharray="84 465" stroke-dashoffset="-285" transform="rotate(-90 1233 575)"/>
  <circle cx="1233" cy="575" r="74" fill="none" stroke="#ef4444" stroke-width="28" stroke-dasharray="34 465" stroke-dashoffset="-369" transform="rotate(-90 1233 575)"/>
  <text x="1205" y="583" class="value" font-size="32">150</text>

  <rect x="330" y="716" width="1078" height="152" rx="24" class="glass"/>
  <text x="362" y="762" class="label">Recent Actions</text>
  <text x="362" y="804" class="small">USER</text>
  <text x="590" y="804" class="small">ACTION</text>
  <text x="780" y="804" class="small">DAYS</text>
  <text x="900" y="804" class="small">DELIVERY</text>
  <text x="1110" y="804" class="small">TIME</text>
  <rect x="362" y="820" width="968" height="1" fill="rgba(255,255,255,.12)"/>
  <text x="362" y="850" class="mono">jdoe</text>
  <rect x="590" y="830" width="88" height="28" rx="14" fill="rgba(245,158,11,.18)"/>
  <text x="610" y="850" class="small" fill="#fbbf24">Warned</text>
  <text x="780" y="850" class="mono">7</text>
  <rect x="900" y="830" width="76" height="28" rx="14" fill="rgba(34,197,94,.18)"/>
  <text x="920" y="850" class="small" fill="#86efac">Sent</text>
  <text x="1110" y="850" class="mono">13:45</text>
</svg>
