{% extends "base.html" %}
{% block title %}Runs{% endblock %}
{% block breadcrumb %}Run History{% endblock %}
{% block content %}
<div class="card glass">
<div class="card-head"><h3>Recent Runs</h3><button class="btn btn-ghost btn-sm" onclick="loadRuns()">Refresh</button></div>
<div class="table-wrap">
<table class="tbl">
<thead><tr><th>Run ID</th><th>Started</th><th>Total</th><th>Compliant</th><th>Warned</th><th>Forced</th><th>Locked</th><th>Errors</th><th>Mode</th></tr></thead>
<tbody id="runsTbody"><tr><td colspan="9" class="muted">Loading...</td></tr></tbody>
</table>
</div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadRuns() {
  const r = await fetch("/api/runs?limit=30", { headers: window.getPceHeaders() });
  if (r.status === 401) {
    document.getElementById("runsTbody").innerHTML = '<tr><td colspan="9" class="muted">Unauthorized. Open Settings and verify API token.</td></tr>';
    return;
  }
  const data = await r.json();
  const tbody = document.getElementById("runsTbody");
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="9" class="muted">No runs yet</td></tr>'; return; }
  tbody.innerHTML = data.map(r => "<tr>"+
    "<td class='mono'>"+r.run_id+"</td>"+
    "<td>"+window.formatDateTime(r.started_at)+"</td>"+
    "<td>"+r.total+"</td>"+
    "<td><span class='pill pill-good'>"+r.compliant+"</span></td>"+
    "<td><span class='pill pill-warn'>"+r.warned+"</span></td>"+
    "<td><span class='pill pill-warn'>"+r.forced_change+"</span></td>"+
    "<td><span class='pill pill-danger'>"+r.disabled+"</span></td>"+
    "<td>"+r.errors+"</td>"+
    "<td>"+(r.whatif ? "Test Policy" : "Run Policy")+"</td>"+
  "</tr>").join("");
}
loadRuns();
document.addEventListener("sse:run_completed", loadRuns);
</script>
{% endblock %}
