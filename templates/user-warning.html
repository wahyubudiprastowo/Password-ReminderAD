<!DOCTYPE html>
<html><head><style>
body{font-family:Segoe UI,sans-serif;background:#f4f6f9;color:#222;margin:0;padding:24px}
.card{background:#fff;border-radius:12px;padding:32px;max-width:600px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.08);border-top:4px solid #f39c12}
h1{color:#f39c12;margin:0 0 16px}
.btn{display:inline-block;background:#0078d4;color:#fff;padding:12px 24px;text-decoration:none;border-radius:6px;margin-top:16px}
.foot{color:#999;font-size:12px;margin-top:24px;padding-top:16px;border-top:1px solid #eee}
</style></head><body><div class="card">
<h1>Password Anda akan Expire</h1>
<p>Halo <strong>{{DisplayName}}</strong>,</p>
<p>Password akun Anda akan expire dalam <strong>{{DaysLeft}} hari</strong> pada <strong>{{ExpiryDate}}</strong>.</p>
<p>{{ResetUrl}}</p>
<div class="foot">Butuh bantuan? {{HelpdeskEmail}}</div>
</div></body></html>
