<!DOCTYPE html>
<html><head><style>
body{font-family:Segoe UI,sans-serif;background:#f4f6f9;padding:24px}
.card{background:#fff;border-radius:12px;padding:24px;max-width:900px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.08)}
h1{color:#0078d4} .sub{color:#666;font-size:13px}
.kpi{display:flex;gap:12px;flex-wrap:wrap;margin:24px 0}
.kpi div{flex:1;min-width:120px;background:#f8f9fb;padding:16px;border-radius:10px;border-left:4px solid #0078d4}
.kpi .n{font-size:28px;font-weight:700;color:#0078d4} .kpi .l{font-size:12px;color:#666;text-transform:uppercase}
.warn{border-left-color:#f39c12} .warn .n{color:#f39c12}
.danger{border-left-color:#e74c3c} .danger .n{color:#e74c3c}
.ok{border-left-color:#27ae60} .ok .n{color:#27ae60}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#0078d4;color:#fff;padding:10px;text-align:left}
td{padding:8px;border-bottom:1px solid #eee}
</style></head><body><div class="card">
<h1>PCE Report</h1>
<div class="sub">Run: {{RunId}} - {{Date}}</div>
<div class="kpi">
<div class="ok"><div class="n">{{Compliant}}</div><div class="l">Compliant</div></div>
<div class="warn"><div class="n">{{Warned}}</div><div class="l">Warned</div></div>
<div class="warn"><div class="n">{{ForcedChange}}</div><div class="l">Forced</div></div>
<div class="danger"><div class="n">{{Disabled}}</div><div class="l">Locked</div></div>
<div><div class="n">{{Total}}</div><div class="l">Total</div></div>
<div class="danger"><div class="n">{{Errors}}</div><div class="l">Errors</div></div>
</div>
<h3>Actions</h3>
{{ActionsTable}}
</div></body></html>
